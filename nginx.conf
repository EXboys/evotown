server {
    listen 80;
    server_name _;

    # 允许 workspace 附件上传（默认单文件 10MB + multipart 开销）
    client_max_body_size 12m;

    root /usr/share/nginx/html;
    index index.html;

    # gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # API 反向代理 → backend（带或不带尾斜杠都匹配）
    location ~ ^/(agents|tasks|config|dispatcher|monitor|api|replay|chronicle|teams|snapshot)(/|$) {
        proxy_pass http://backend:8765;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;  # 保留原始端口（如 :8080），避免 FastAPI 307 重定向丢端口
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        proxy_buffering off;
        proxy_cache off;
    }

    # WebSocket 反向代理
    location /ws {
        proxy_pass http://backend:8765;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_read_timeout 3600s;
    }

    # 健康检查透传
    location /health {
        proxy_pass http://backend:8765;
    }

    # 带哈希的静态资源可长期缓存（文件名变即自动失效）
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # HTML 文件不缓存（保证 JS bundle 哈希更新后浏览器能加载新版）
    # 排除 /api/ 路径（后端 webview 等 .html 由 API proxy 处理）
    location ~* ^(?!/api/).*\.html$ {
        try_files $uri /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # SPA fallback — 所有其他路由交给 React Router
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }
}

