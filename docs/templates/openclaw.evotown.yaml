# OpenClaw 企业接入 — 引用 evotown.agent.env 中的两行配置
#
# 1. IT 分发 evotown.agent.env（含 EVOTOWN_URL + EVOTOWN_API_KEY）
# 2. 在本机 shell 或 OpenClaw 启动脚本中 source 该文件
# 3. 将下方片段合并进 OpenClaw 配置

llm:
  openai_base_url: ${EVOTOWN_URL}/api/gateway/v1
  openai_api_key: ${EVOTOWN_API_KEY}

skills_market:
  manifest_url: ${EVOTOWN_URL}/api/v1/market/bundles/default-agent-skills/manifest?runtime_target=openclaw
  auth_header: Authorization
  auth_prefix: "Bearer "
  auth_token: ${EVOTOWN_API_KEY}
  channel: stable

# Evotown Connector 派活：本机 Gateway 接收 POST /hooks/agent
# 将 EVOTOWN_HOOK_TOKEN 与 OPENCLAW_HOOK_TOKEN 设为同一随机串
hooks:
  enabled: true
  token: "${EVOTOWN_HOOK_TOKEN}"
  path: "/hooks"
  defaultSessionKey: "hook:evotown"
  allowRequestSessionKey: false
  allowedSessionKeyPrefixes: ["hook:"]
